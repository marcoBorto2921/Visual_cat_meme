camera:
  index: 0
  width: 640
  height: 480
  fps: 30

pose:
  visibility_threshold: 0.5
  model_path: null  # null = scarica automaticamente MediaPipe

face:
  enabled: true              # false = disabilita face features (ultimi 5 dim saranno zero)
  model_path: null           # null = scarica automaticamente FaceLandmarker
  visibility_threshold: 0.5

classifier:
  model: "svm"             # "svm" o "mlp"
  confidence_threshold: 0.4
  smoothing_window: 7      # frame per il majority vote
  svm:
    C: 10.0
    kernel: "rbf"
    gamma: "scale"
    probability: true
  mlp:
    hidden_layer_sizes: [128, 64]
    max_iter: 1000
    random_state: 42

data_collection:
  samples_per_pose: 30     # frame campionati per ogni posa
  cats_dir: "assets/cats"
  output_file: "data/samples.csv"

display:
  window_title: "CatPose"
  cat_panel_width: 480
  debug_mode: false
  font_scale: 1.0

paths:
  classifier: "models/classifier.pkl"
  label_encoder: "models/label_encoder.pkl"
  screenshots: "screenshots"
